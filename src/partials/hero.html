<section class="hero">
  <div class="container hero-container">
    <div class="hero-content">
      <h1 class="hero-title">
        See Faster.<br class="hero-mobile-break" />
        Match<br class="hero-desktop-break" />
        Smarter.
      </h1>
      <p class="hero-text">
        Relaxing triple-match gameplay
        <br class="hero-text-mobile-break" />
        with immersive 3D
        <span>puzzles.</span>
      </p>
      <a
        class="hero-store-link"
        href="https://play.google.com/store/apps/details?id=com.triplematch.tile.game"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Get Match Triple 3D on Google Play"
      >
        <picture>
          <source
            media="(min-width: 1440px)"
            srcset="
              ./img/png/google-play-desctop@1x.png 1x,
              ./img/png/google-play-desctop@2x.png 2x
            "
          />
          <img
            class="hero-store-badge"
            src="./img/png/google-play-mobile@1x.png"
            srcset="./img/png/google-play-mobile@2x.png 2x"
            alt="Get it on Google Play"
            width="123"
            height="36"
          />
        </picture>
      </a>
    </div>
  </div>
</section>
